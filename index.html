<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKV Bro's Gaming-Garden Gate</title>
    <style>
        /* Dark Fantasy Aesthetic */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a0f05; /* Deep dark stone color */
            font-family: 'Cinzel', serif;
        }

        /* 1. The main gate background */
        .gate-stage {
            width: 100vw;
            height: 100vh;
            background: url('gate_background.png') no-repeat center center;
            background-size: contain;
            position: relative;
            box-shadow: 0 0 50px #8b4513;
            border-radius: 50px 50px 0 0;
            max-width: 500px; /* Example max-width for consistency */
            margin: auto;
            transition: transform 1.5s ease-in-out, opacity 1s;
        }

        /* 2. Text styling over the background */
        h1 { font-size: 3rem; margin-bottom: 0; text-shadow: 2px 2px #000; color: #f0c05a; position: relative; top: 10px; left: center; width: 100%; text-align: center;}
        p { font-size: 1.1rem; color: #d4af37; line-height: 1.6; text-align: center; max-width: 80%; margin: 20px auto; position: relative; top: 10px;}

        /* Equation and Input Box */
        .equation-box {
            position: absolute;
            top: 60%; /* Adjust to match the box placement in the image */
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 2.5rem;
            color: #f0c05a;
        }

        #answerInput {
            width: 80px;
            background: transparent;
            border: none;
            border-bottom: 3px solid #f0c05a;
            color: #ff4500;
            text-align: center;
            font-size: 2.5rem;
            outline: none;
            font-family: 'Cinzel', serif;
        }

        #answerInput::placeholder { color: #f0c05a; }

        /* 3. The Skull and Overlays */
        .skull-hands {
            position: absolute;
            bottom: 20%; /* Match image placement */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* The transparent burning eye overlay */
        #eyeAnimation {
            position: absolute;
            top: 25px; /* Adjust to match the skull's eye sockets */
            width: 50px;
            height: 50px;
            background: transparent;
            opacity: 0; /* Hidden initially */
            pointer-events: none;
        }

        /* Make the eye overlay visible when needed */
        .burn-active {
            opacity: 1 !important;
        }

        /* 4. The Tumbler (Decorative only in this version) */
        .tumbler {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            font-size: 1.5rem;
            opacity: 0.8;
        }

        /* Gate open animation state */
        .gate-open {
            transform: scale(2) translateY(-100%);
            opacity: 0;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="gate-stage" id="gate">
        
        <p><i>Welcome to MKV Bro's Gaming-Garden.</i></p>

        <div class="equation-box">
            <span id="num1"></span> + <span id="num2"></span> + <span id="num3"></span> = 
            <input type="number" id="answerInput" placeholder="?" autocomplete="off">
        </div>

        <div class="skull-hands">
            <div id="eyeAnimation" class="burning-eyes">
                <img src="assets/skull_burning_eyes.gif" alt="" width="50" height="50">
            </div>
        </div>

        <div class="tumbler">
            <span>1</span> <span>7</span> <span>9</span> </div>

    </div>

    <audio id="soundEffect" src="assets/correct_answer.mp3"></audio>

    <script>
        // 1. Generate 3 random numbers (1-9)
        const n1 = Math.floor(Math.random() * 9) + 1;
        const n2 = Math.floor(Math.random() * 9) + 1;
        const n3 = Math.floor(Math.random() * 9) + 1;
        const correctAnswer = n1 + n2 + n3;

        // Display on page
        document.getElementById('num1').innerText = n1;
        document.getElementById('num2').innerText = n2;
        document.getElementById('num3').innerText = n3;

        // 2. Interaction
        const input = document.getElementById('answerInput');
        input.addEventListener('input', function() {
            if (parseInt(this.value) === correctAnswer) {
                correctAnswerActions();
            }
        });

        function correctAnswerActions() {
            // A. Activate burning eyes
            document.getElementById('eyeAnimation').classList.add('burn-active');
            
            // B. Play the sound (Skeleton laugh)
            const sound = document.getElementById('soundEffect');
            sound.play().catch(e => console.log("Sound failed to play due to browser interaction rules."));

            // C. Hold for a moment so they can see/hear, then open the door
            setTimeout(() => {
                const gate = document.getElementById('gate');
                gate.classList.add('gate-open');
            }, 1000); // 1-second delay for the sound and laugh

            // D. Redirect
            setTimeout(() => {
                window.location.href = "main_games_page.html"; // Your next page
            }, 2500); // 2.5 seconds total delay before leaving
        }
    </script>
</body>
</html>
