<!DOCTYPE html>
<html>
<head>

<title>MKV Bro's Gaming Garden</title>

<style>

body{
margin:0;
height:100vh;
background:url("gate.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia;
color:white;
overflow:hidden;
}

.container{
text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px gold;
}

h1{
color:gold;
font-size:50px;
margin-bottom:20px;
}

.question{
font-size:40px;
margin:20px;
}

.answers button{
font-size:28px;
padding:15px 40px;
margin:10px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
transition:0.3s;
}

.answers button:hover{
background:orange;
transform:scale(1.1);
}

#skull{
font-size:80px;
cursor:pointer;
margin-top:20px;
animation:skullglow 1s infinite alternate;
}

@keyframes skullglow{

from{ text-shadow:0 0 10px orange; }

to{ text-shadow:0 0 40px red; }

}

.torch{
position:absolute;
top:30%;
width:80px;
}

.left{
left:5%;
}

.right{
right:5%;
}

#door{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
color:gold;
opacity:0;
pointer-events:none;
transition:1.5s;
}

</style>

</head>

<body>

<img src="fire.gif" class="torch left">
<img src="fire.gif" class="torch right">

<div class="container">

<h1>MKV Bro's Gate</h1>

<div id="question" class="question"></div>

<div class="answers" id="answers"></div>

<div id="skull">💀</div>

</div>

<div id="door">Gate Opening...</div>

<audio id="sound" src="open.mp3"></audio>

<script>

let a=Math.floor(Math.random()*10)+1
let b=Math.floor(Math.random()*10)+1
let c=Math.floor(Math.random()*10)+1

let correct=a+b+c

document.getElementById("question").innerHTML=a+" + "+b+" + "+c+" = ?"

let options=[correct,correct+2,correct-2]

options.sort(()=>Math.random()-0.5)

let selected=null

options.forEach(function(num){

let btn=document.createElement("button")

btn.innerHTML=num

btn.onclick=function(){

selected=num

}

document.getElementById("answers").appendChild(btn)

})

document.getElementById("skull").onclick=function(){

if(selected==correct){

document.getElementById("sound").play()

let door=document.getElementById("door")

door.style.opacity=1

setTimeout(function(){

window.location="home.html"

},2000)

}

else{

alert("Wrong answer ❌ Try again")

}

}

</script>

</body>
</html>
