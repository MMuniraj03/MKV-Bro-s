<!DOCTYPE html>
<html>
<head>
<title>MKV Bro's Gaming Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#3b2600,#000);
font-family:Trebuchet MS;
color:white;
overflow:hidden;
}

/* Gate Doors */

.door{
position:fixed;
top:0;
width:50%;
height:100%;
background:linear-gradient(90deg,#5a3a00,#caa300,#5a3a00);
z-index:10;
transition:2s;
}

.left{
left:0;
border-right:4px solid #000;
}

.right{
right:0;
border-left:4px solid #000;
}

.open-left{
transform:translateX(-100%);
}

.open-right{
transform:translateX(100%);
}

/* Center panel */

.panel{
position:relative;
z-index:20;
text-align:center;
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:20px;
box-shadow:0 0 30px gold;
}

h1{
color:gold;
font-size:50px;
}

.question{
font-size:40px;
margin:20px;
}

button{
font-size:26px;
padding:12px 35px;
margin:10px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:orange;
transform:scale(1.1);
}

#skull{
font-size:80px;
cursor:pointer;
margin-top:20px;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px orange; }
to{ text-shadow:0 0 40px red; }
}

</style>
</head>

<body>

<div class="door left" id="leftDoor"></div>
<div class="door right" id="rightDoor"></div>

<div class="panel">

<h1>MKV Bro's Gate</h1>

<div id="question" class="question"></div>

<div id="answers"></div>

<div id="skull">💀</div>

</div>

<script>

/* Random math puzzle */

let a=Math.floor(Math.random()*10)+1
let b=Math.floor(Math.random()*10)+1
let c=Math.floor(Math.random()*10)+1

let correct=a+b+c

document.getElementById("question").innerHTML=a+" + "+b+" + "+c+" = ?"

let options=[correct,correct+2,correct-2]

options.sort(()=>Math.random()-0.5)

let selected=null

options.forEach(num=>{
let btn=document.createElement("button")
btn.innerHTML=num
btn.onclick=function(){selected=num}
document.getElementById("answers").appendChild(btn)
})

/* Skull unlock */

document.getElementById("skull").onclick=function(){

if(selected==correct){

document.getElementById("leftDoor").classList.add("open-left")
document.getElementById("rightDoor").classList.add("open-right")

setTimeout(function(){

document.body.innerHTML=
"<h1 style='color:gold;text-align:center;margin-top:20%'>WELCOME TO MKV BRO'S GAMING GARDEN 🎮</h1>"

},2000)

}

else{

alert("Wrong answer ❌ Try again")

}

}

</script>

</body>
</html>
