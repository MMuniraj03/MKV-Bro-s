<!DOCTYPE html>
<html>
<head>
<title>MKV Bro's Gaming Garden</title>

<style>

body{
margin:0;
height:100vh;
background:url("gate.png") no-repeat center center;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia;
color:white;
overflow:hidden;
}

/* fire torches */

.fire{
position:absolute;
width:120px;
}

.leftfire{
left:7%;
top:35%;
}

.rightfire{
right:7%;
top:35%;
}

/* question panel */

.panel{
background:rgba(0,0,0,0.65);
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px orange;
}

.question{
font-size:40px;
margin-bottom:20px;
}

/* buttons */

button{
font-size:28px;
padding:12px 35px;
margin:10px;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
}

button:hover{
background:orange;
}

/* skull button */

#skull{
font-size:80px;
cursor:pointer;
margin-top:20px;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px orange; }
to{ text-shadow:0 0 35px red; }
}

/* gate opening screen */

#openGate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
color:gold;
opacity:0;
pointer-events:none;
transition:2s;
}

</style>
</head>

<body>

<!-- fire torches -->
<img src="fire.gif" class="fire leftfire">
<img src="fire.gif" class="fire rightfire">

<div class="panel">

<div class="question">
2 + 5 + 5 = ?
</div>

<button onclick="selectAnswer(2)">2</button>
<button onclick="selectAnswer(4)">4</button>
<button onclick="selectAnswer(12)">12</button>

<div id="skull" onclick="checkAnswer()">💀</div>

</div>

<div id="openGate">WELCOME TO MKV GAMING GARDEN</div>

<audio id="sound">
<source src="laugh.mp3" type="audio/mpeg">
</audio>

<script>

let selected=null

function selectAnswer(num){
selected=num
}

function checkAnswer(){

if(selected==12){

document.getElementById("sound").play()

let gate=document.getElementById("openGate")

gate.style.opacity=1

}else{

alert("Wrong answer ❌")

}

}

</script>

</body>
</html>
