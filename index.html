<!DOCTYPE html>
<html>
<head>

<title>MKV Bro's</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Georgia, serif;
color:#ffd700;
text-align:center;
background-image:url("https://images.unsplash.com/photo-1508612761958-e931f1f4f8b7");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* dark overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* TITLE */

.title{
font-size:48px;
text-shadow:0 0 20px gold;
margin-bottom:20px;
}

/* DESCRIPTION */

.desc{
max-width:700px;
font-size:20px;
line-height:1.6;
}

/* SKELETON */

.skeleton{
font-size:100px;
margin-top:20px;
transition:0.4s;
filter:drop-shadow(0 0 15px orange);
}

/* QUESTION BOX */

.question-box{
margin-top:25px;
padding:15px 35px;
border-radius:10px;
border:3px solid gold;
background:rgba(50,50,50,0.7);
font-size:28px;
}

/* SLOT NUMBERS */

.slot{
display:inline-block;
width:40px;
transition:0.3s;
}

/* CLICK QUESTION */

.ask{
cursor:pointer;
color:white;
text-shadow:0 0 8px white;
}

/* FIRE TORCHES */

.torch{
position:absolute;
font-size:45px;
animation:flicker 0.15s infinite alternate;
}

.left{left:25px;top:50%;}
.right{right:25px;top:50%;}

@keyframes flicker{
from{transform:scale(1) rotate(-2deg);}
to{transform:scale(1.15) rotate(2deg);}
}

/* SLOT SPIN ANIMATION */

.spin{
animation:spin 0.1s linear infinite;
}

@keyframes spin{
from{transform:translateY(-10px)}
to{transform:translateY(10px)}
}

/* DOOR OPEN EFFECT */

.open{
animation:doorOpen 1.2s forwards;
}

@keyframes doorOpen{
0%{transform:scale(1)}
100%{transform:scale(2);opacity:0}
}

</style>
</head>

<body>

<div class="torch left">🔥</div>
<div class="torch right">🔥</div>

<div class="title">MKV Bro’s</div>

<div class="desc">

Welcome to MKV Bro’s Gaming-Garden.<br>
Your loneliness ends here.<br>
We have Adventure, Action, Puzzles, Maths,
Brain Training, Race Etc…<br><br>

If you want to open the door first,
Answer the question

</div>

<div class="skeleton" id="skull">💀</div>

<div class="question-box">

<span id="n1" class="slot">2</span> +
<span id="n2" class="slot">5</span> +
<span id="n3" class="slot">5</span>
=
<span class="ask" onclick="enterAnswer()">?</span>

</div>

<script>

let a,b,c,answer

function newQuestion(){

a=Math.floor(Math.random()*9)+1
b=Math.floor(Math.random()*9)+1
c=Math.floor(Math.random()*9)+1

answer=a+b+c

document.getElementById("n1").innerText=a
document.getElementById("n2").innerText=b
document.getElementById("n3").innerText=c

}

function spinNumbers(){

let slots=document.querySelectorAll(".slot")

slots.forEach(s=>s.classList.add("spin"))

setTimeout(()=>{

slots.forEach(s=>s.classList.remove("spin"))
newQuestion()

},900)

}

function enterAnswer(){

let user=prompt("Enter the answer")

let skull=document.getElementById("skull")

if(user==answer){

skull.innerText="😄"
document.body.classList.add("open")

setTimeout(()=>{
window.location="games.html"
},1200)

}

else{

skull.innerText="😡"
spinNumbers()

}

}

newQuestion()

</script>

</body>
</html>
