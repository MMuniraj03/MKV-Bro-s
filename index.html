<!DOCTYPE html>
<html>
<head>

<title>MKV Bro's</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Georgia;
color:#ffd700;
text-align:center;
background:url("https://images.unsplash.com/photo-1604079628041-bb9c7e5c8a7a") center/cover no-repeat;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* TITLE */

.title{
font-size:48px;
margin-bottom:20px;
text-shadow:0 0 15px gold;
}

/* DESCRIPTION */

.desc{
max-width:700px;
font-size:20px;
line-height:1.6;
}

/* SKELETON */

.skeleton{
font-size:90px;
margin-top:20px;
animation:eyeGlow 2s infinite alternate;
}

@keyframes eyeGlow{
from{filter:drop-shadow(0 0 5px red)}
to{filter:drop-shadow(0 0 20px orange)}
}

/* QUESTION BOX */

.question-box{
margin-top:20px;
padding:15px 30px;
border:2px solid gold;
border-radius:8px;
font-size:26px;
background:rgba(0,0,0,0.6);
}

/* SLOT NUMBERS */

.slot{
display:inline-block;
width:40px;
}

/* ? button */

.ask{
cursor:pointer;
color:white;
text-shadow:0 0 5px white;
}

/* FIRE LAMPS */

.lamp{
position:absolute;
font-size:40px;
animation:flicker 0.2s infinite alternate;
}

.left{left:40px;top:50%;}
.right{right:40px;top:50%;}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

</style>
</head>

<body>

<div class="lamp left">🔥</div>
<div class="lamp right">🔥</div>

<div class="title">MKV Bro’s</div>

<div class="desc">

Welcome to MKV Bro’s Gaming-Garden.<br>
Your loneliness ends here.<br>
We have Adventure, Action, Puzzles, Maths, Brain Training, Race Etc…<br><br>

If you want to open the door first,
Answer the question

</div>

<div class="skeleton" id="skull">💀</div>

<div class="question-box">

<span id="n1" class="slot">2</span> +
<span id="n2" class="slot">5</span> +
<span id="n3" class="slot">5</span>
=

<span class="ask" onclick="ask()">?</span>

</div>

<script>

let a,b,c,answer;

function newQuestion(){

a=Math.floor(Math.random()*9)+1
b=Math.floor(Math.random()*9)+1
c=Math.floor(Math.random()*9)+1

answer=a+b+c

document.getElementById("n1").innerText=a
document.getElementById("n2").innerText=b
document.getElementById("n3").innerText=c

}

function spin(){

let spins=10

let interval=setInterval(function(){

document.getElementById("n1").innerText=Math.floor(Math.random()*9)+1
document.getElementById("n2").innerText=Math.floor(Math.random()*9)+1
document.getElementById("n3").innerText=Math.floor(Math.random()*9)+1

spins--

if(spins==0){
clearInterval(interval)
newQuestion()
}

},100)

}

function ask(){

let user=prompt("Enter Answer")

if(user==answer){

document.getElementById("skull").innerText="😄"

setTimeout(function(){
window.location="games.html"
},1200)

}

else{

document.getElementById("skull").innerText="😡"

spin()

}

}

newQuestion()

</script>

</body>
</html>
