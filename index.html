<!DOCTYPE html>
<html>
<head>
<title>MKV Bros's</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
text-align:center;
}

header{
background:#ff6600;
padding:25px;
}

header h1{
margin:0;
font-size:32px;
}

header p{
margin:5px 0 0 0;
font-size:16px;
opacity:0.9;
}

.games{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.game-card{
background:#222;
width:250px;
margin:15px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.game-card img{
width:100%;
height:150px;
object-fit:cover;
}

.game-card h3{
margin:10px;
}

.play-btn{
display:block;
background:#ff6600;
color:white;
padding:10px;
text-decoration:none;
margin:10px;
border-radius:5px;
}

.play-btn:hover{
background:#ff4500;
}

footer{
margin-top:30px;
padding:15px;
background:#000;
}

</style>
</head>

<body>

<header>
<h1>🎮 MKV Bros's</h1>
<p>Gaming-Garden</p>
</header>

<div class="games">

<div class="game-card">
<img src="https://picsum.photos/300/200?1">
<h3>Click Speed Game</h3>
<a href="game1.html" class="play-btn">Play Game</a>
</div>

<div class="game-card">
<img src="https://picsum.photos/300/200?2">
<h3>Snake Game</h3>
<a href="snake.html" class="play-btn">Play Game</a>
</div>

<div class="game-card">
<img src="https://picsum.photos/300/200?3">
<h3>Puzzle Game</h3>
<a href="puzzle.html" class="play-btn">Play Game</a>
</div>

<div class="game-card">
<img src="https://picsum.photos/300/200?4">
<h3>Quiz Game</h3>
<a href="quiz.html" class="play-btn">Play Game</a>
</div>

</div>

<footer>
© 2026 MKV Bros's
</footer>

</body>
</html>
