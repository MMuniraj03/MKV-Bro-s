<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MKV Bro's Gaming Garden</title>

<style>

body{
margin:0;
height:100vh;
background-image:url("gate.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

/* fire */

.fire{
position:absolute;
width:150px;
}

.left{
left:5%;
top:35%;
}

.right{
right:5%;
top:35%;
}

/* panel */

.panel{
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:15px;
text-align:center;
}

.question{
font-size:40px;
margin-bottom:20px;
}

button{
font-size:25px;
padding:12px 30px;
margin:10px;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
}

#skull{
font-size:70px;
cursor:pointer;
margin-top:20px;
}

#open{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
color:gold;
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<img src="fire.gif" class="fire left">
<img src="fire.gif" class="fire right">

<div class="panel">

<div class="question">
2 + 5 + 5 = ?
</div>

<button onclick="ans(2)">2</button>
<button onclick="ans(4)">4</button>
<button onclick="ans(12)">12</button>

<div id="skull" onclick="check()">💀</div>

</div>

<div id="open">WELCOME TO MKV BRO'S GAMING GARDEN</div>

<audio id="sound" src="laugh.mp3"></audio>

<script>

let selected=0

function ans(x){
selected=x
}

function check(){

if(selected==12){

document.getElementById("sound").play()

document.getElementById("open").style.opacity=1

}else{

alert("Wrong answer")

}

}

</script>

</body>
</html>
