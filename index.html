<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MKV Bro's Portal</title>

<style>

body{
margin:0;
height:100vh;
background:url("portal.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia;
overflow:hidden;
color:#f4d37a;
}

/* FIRE LAMPS */

.fire{
position:absolute;
width:120px;
bottom:32%;
filter:drop-shadow(0 0 15px orange);
}

.fire.left{left:6%;}
.fire.right{right:6%;}

/* SKELETON */

.skeleton{
position:absolute;
width:170px;
bottom:18%;
left:50%;
transform:translateX(-50%);
transition:0.4s;
}

/* GOLD QUESTION BOX */

.box{
position:absolute;
bottom:45%;
left:50%;
transform:translateX(-50%);
background:gold;
padding:12px 22px;
border-radius:8px;
font-size:30px;
color:black;
display:flex;
gap:10px;
align-items:center;
}

/* INPUT */

input{
width:70px;
font-size:26px;
text-align:center;
border:none;
border-radius:4px;
}

/* QUESTION MARK */

.qmark{
cursor:pointer;
color:#444;
font-weight:bold;
}

</style>

</head>

<body>

<img src="fire.gif" class="fire left">
<img src="fire.gif" class="fire right">

<img src="skul.gif" class="skeleton" id="skull">

<div class="box">

<span id="question"></span>

<span class="qmark" onclick="focusInput()">?</span>

<input type="number" id="answer">

</div>

<audio id="sound" src="smil.mp3"></audio>

<script>

/* RANDOM NUMBERS */

let a,b,c,correct

function newQuestion(){

a=Math.floor(Math.random()*9)+1
b=Math.floor(Math.random()*9)+1
c=Math.floor(Math.random()*9)+1

correct=a+b+c

document.getElementById("question").innerHTML=
a+" + "+b+" + "+c+" ="

}

newQuestion()

/* OPEN KEYBOARD */

function focusInput(){

document.getElementById("answer").focus()

}

/* CHECK ANSWER */

document.getElementById("answer").addEventListener("change",function(){

let value=parseInt(this.value)

if(value===correct){

document.getElementById("sound").play()

document.getElementById("skull").style.transform=
"translateX(-50%) scale(1.35)"

setTimeout(function(){

window.location="home.html"

},1200)

}

else{

alert("Wrong answer")

this.value=""

newQuestion()

}

})

</script>

</body>

</html>
