<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKV Bro's Gaming-Garden</title>
    <style>
        /* Dark Fantasy Aesthetic */
        body {
            background: #1a0f05;
            color: #f0c05a;
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .gate-container {
            text-align: center;
            border: 8px solid #5a3e1b;
            padding: 40px;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://www.transparenttextures.com/patterns/dark-stone.png');
            box-shadow: 0 0 50px #8b4513;
            border-radius: 50px 50px 0 0;
            max-width: 500px;
            position: relative;
            transition: transform 1.5s ease-in-out, opacity 1s;
        }

        h1 { font-size: 3rem; margin-bottom: 0; text-shadow: 2px 2px #000; }
        p { font-size: 1.1rem; color: #d4af37; line-height: 1.6; }

        .equation-box {
            background: rgba(45, 25, 10, 0.9);
            border: 3px solid #f0c05a;
            padding: 20px;
            font-size: 2.5rem;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input {
            width: 80px;
            background: transparent;
            border: none;
            border-bottom: 3px solid #f0c05a;
            color: #ff4500;
            text-align: center;
            font-size: 2.5rem;
            outline: none;
            font-family: 'Cinzel', serif;
        }

        input::placeholder { color: #f0c05a; }

        .skull { font-size: 4rem; margin-top: 20px; filter: drop-shadow(0 0 10px orange); }

        /* Animation for opening the door */
        .gate-open {
            transform: scale(2) translateY(-100%);
            opacity: 0;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="gate-container" id="gate">
        <h1>MKV Bro's</h1>
        <p>Welcome to MKV Bro's Gaming-Garden.<br>
           Your loneliness ends here.<br>
           Adventure, Action, Puzzles, Maths, Brain Training, Race Etc...</p>
        
        <p><i>If you want to open the door first, Answer the question</i></p>

        <div class="equation-box">
            <span id="num1"></span> + <span id="num2"></span> + <span id="num3"></span> = 
            <input type="number" id="answerInput" placeholder="?" autocomplete="off">
        </div>

        <div class="skull">💀</div>
    </div>

    <script>
        // 1. Generate 3 random numbers between 1 and 9
        const n1 = Math.floor(Math.random() * 9) + 1;
        const n2 = Math.floor(Math.random() * 9) + 1;
        const n3 = Math.floor(Math.random() * 9) + 1;
        const correctAnswer = n1 + n2 + n3;

        // 2. Display them on the page
        document.getElementById('num1').innerText = n1;
        document.getElementById('num2').innerText = n2;
        document.getElementById('num3').innerText = n3;

        // 3. Listen for the answer
        const input = document.getElementById('answerInput');
        input.addEventListener('input', function() {
            if (parseInt(this.value) === correctAnswer) {
                openDoor();
            }
        });

        function openDoor() {
            const gate = document.getElementById('gate');
            gate.classList.add('gate-open');
            
            // Wait for animation, then redirect to your main games page
            setTimeout(() => {
                window.location.href = "home.html"; // Replace with your main page file
            }, 1200);
        }
    </script>
</body>
</html>
